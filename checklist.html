<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SKF 5S — Checklist</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a57d5" />
  <link rel="icon" href="assets/pwa-192.png" />

  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body data-page="checklist">
  <header class="topbar">
    <div class="brand">
      <a class="back" href="index.html">← Indietro</a>
      <img src="assets/skf-logo.png" alt="SKF" class="brand-logo" />
      <span class="brand-text"><strong>SKF</strong> <em>5S</em></span>
    </div>
    <div class="top-actions">
      <span id="pageTitle" class="page-title">CH 24 — Rettifica</span>
      <button id="lockBtn" class="icon-btn" aria-label="Impostazioni (PIN)">
        <span class="lock-ico">🔒</span>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="stats">
      <div class="stat">
        <span>Voto medio</span>
        <strong id="avgScore">0%</strong>
      </div>
      <div class="stat">
        <span>Azioni in ritardo</span>
        <strong id="lateCount">0</strong>
      </div>
    </section>

    <div id="summaryBadges" class="summary-badges"></div>
    
    <div class="actions-row" style="display: flex; gap: 10px; flex-wrap: wrap;">
      <button id="btnOperatore" class="pill" style="border: 2px solid var(--skf); color: var(--skf); font-weight: bold; background: #fff; flex-grow: 1;">👤 Imposta Operatore</button>
      <button id="toggleAll" class="pill blue" style="flex-grow: 1;">Comprimi / Espandi</button>
    </div>

    <section id="sheets" class="sheets"></section>
  </main>

  <dialog id="infoDialog" class="modal">
    <form method="dialog" class="modal-box" style="background: #f1f5f9;">
      <div class="sticky-top" style="background: #f1f5f9; border-bottom: none;">
        <h4 id="infoTitle" style="font-size: 1.3rem;">Compilazione</h4>
        <button id="infoCloseBtn" class="pill blue small">Salva e Chiudi</button>
      </div>
      <p style="margin: 0 14px 14px 14px; font-size: 0.9rem; color: #64748b;">
        Seleziona il punteggio per ogni voce. Il sistema calcolerà automaticamente la media e compilerà le note.
      </p>
      <div id="infoContent" class="info-content"></div>
    </form>
  </dialog>

  <dialog id="pinDialog" class="modal">
    <form method="dialog" class="modal-box">
      <h4>Impostazioni canale & PIN</h4>

      <label class="field">
        <span>PIN attuale</span>
        <input id="pinInput" inputmode="numeric" pattern="[0-9]*" placeholder="••••" />
      </label>

      <label class="field">
        <span>Canale (es. CH 24)</span>
        <input id="channelInput" />
      </label>

      <div class="grid2">
        <label class="field"><span>Nuovo PIN</span><input id="newPin1" inputmode="numeric" pattern="[0-9]*" placeholder="(opzionale)" /></label>
        <label class="field"><span>Ripeti PIN</span><input id="newPin2" inputmode="numeric" pattern="[0-9]*" placeholder="(opzionale)" /></label>
      </div>

      <div class="modal-actions">
        <button id="pinCancel" class="pill">Annulla</button>
        <button id="pinConfirmBtn" class="pill blue">Salva</button>
      </div>
    </form>
  </dialog>
</body>
</html>
